<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pasatiempos y Juegos</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #000000;
      color: #e8e8f0;
      font-family: 'Nunito', sans-serif;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      gap: 0;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      color: #fff;
      letter-spacing: 0.03em;
      margin-bottom: clamp(10px, 2vh, 22px);
      text-align: center;
    }
    h1 span { color: #a78bfa; }

    .list {
      display: flex;
      flex-direction: column;
      gap: clamp(2px, 1vh, 10px);
      width: 100%;
      max-width: 560px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 22px);
      text-decoration: none;
      color: #e8e8f0;
      padding: clamp(4px, 0.8vh, 10px) clamp(10px, 2vw, 20px);
      border-radius: 14px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .item:hover {
      background: rgba(255,255,255,0.04);
      border-color: var(--c, #a78bfa);
      transform: translateX(6px);
    }

    .icon {
      width: clamp(36px, 5vw, 52px);
      height: clamp(36px, 5vw, 52px);
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px var(--c, #a78bfa));
    }

    .name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.95rem, 2vw, 1.25rem);
      letter-spacing: 0.01em;
      color: #fff;
    }

    .arrow {
      margin-left: auto;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      color: var(--c, #a78bfa);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .item:hover .arrow { opacity: 1; transform: translateX(4px); }
  </style>

  <link rel="apple-touch-icon" href="/icons/icon-apple-180.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#000000"/>

</head>

<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random() * 0.7 + 0.2,
        speed: Math.random() * 0.3 + 0.05
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed * 0.02;
      const alpha = 0.2 + Math.abs(Math.sin(s.a)) * 0.7;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
</script>
