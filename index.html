<!DOCTYPE html>
<html lang="es">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #000000;
      color: #e8e8f0;
      font-family: 'Nunito', sans-serif;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      gap: 0;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      color: #fff;
      letter-spacing: 0.03em;
      margin-bottom: clamp(10px, 2vh, 22px);
      text-align: center;
    }
    h1 span { color: #a78bfa; }

    .list {
      display: flex;
      flex-direction: column;
      gap: clamp(2px, 1vh, 10px);
      width: 100%;
      max-width: 560px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 22px);
      text-decoration: none;
      color: #e8e8f0;
      padding: clamp(4px, 0.8vh, 10px) clamp(10px, 2vw, 20px);
      border-radius: 14px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .item:hover {
      background: rgba(255,255,255,0.04);
      border-color: var(--c, #a78bfa);
      transform: translateX(6px);
    }

    .icon {
      width: clamp(36px, 5vw, 52px);
      height: clamp(36px, 5vw, 52px);
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px var(--c, #a78bfa));
    }

    .name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.95rem, 2vw, 1.25rem);
      letter-spacing: 0.01em;
      color: #fff;
    }

    .arrow {
      margin-left: auto;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      color: var(--c, #a78bfa);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .item:hover .arrow { opacity: 1; transform: translateX(4px); }

    /* Botón de sonido */
    #soundBtn {
      position: fixed;
      bottom: max(14px, env(safe-area-inset-bottom));
      right: 16px;
      z-index: 10;
      background: rgba(8,13,26,0.55);
      border: 1px solid rgba(125,211,252,0.2);
      border-radius: 50%;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #soundBtn:hover { border-color: rgba(125,211,252,0.5); background: rgba(8,13,26,0.8); }
  </style>

  <link rel="apple-touch-icon" href="/icons/icon-apple-180.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#000000"/>
</head>

<script>
(function(){
  /* ============================================================
     CANVAS / RAYOS
  ============================================================ */
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');

  const DEPTH  = 9;
  const BRANCH = 0.50;
  const TURB   = 240;
  const FADE   = 1.25;

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W, H, stars = [];

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    generateStars();
    drawScene();
  }

  function generateStars(){
    stars = [];
    const count = Math.floor((W * H) / 9000);
    for(let i = 0; i < count; i++){
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.8,
        r: Math.random() * 1.3 + 0.3,
        speed: Math.random() * 0.3 + 0.05,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,   '#05070f');
    g.addColorStop(0.6, '#0b1226');
    g.addColorStop(1,   '#141b33');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#cdd9f5';
    const t = performance.now() / 1000;
    for(const s of stars){
      const alpha = 0.15 + Math.abs(Math.sin(s.phase + t * s.speed)) * 0.65;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function generateBolt(originX, targetX){
    const segments = [];
    function recurse(x1,y1,x2,y2,d,disp,isBranch,level){
      if(d<=0){ segments.push({x1,y1,x2,y2,isBranch,level}); return; }
      const mx=(x1+x2)/2, my=(y1+y2)/2;
      const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
      const off=(Math.random()-0.5)*disp;
      let nx=0,ny=0;
      if(len>0){ nx=-dy/len; ny=dx/len; }
      const px=mx+nx*off, py=my+ny*off;
      recurse(x1,y1,px,py, d-1,disp*0.55,isBranch,level+1);
      recurse(px,py,x2,y2, d-1,disp*0.55,isBranch,level+1);
      if(!isBranch && d>1 && Math.random()<BRANCH){
        const ang=Math.atan2(y2-y1,x2-x1)+(Math.random()-0.5)*1.6;
        const blen=len*(0.25+Math.random()*0.35);
        recurse(px,py, px+Math.cos(ang)*blen, py+Math.sin(ang)*blen,
                Math.min(d-1,4), disp*0.5, true, 0);
      }
    }
    recurse(originX,-20,targetX,H+20, DEPTH,TURB,false,0);
    return segments;
  }

  function drawBolt(segments,alpha){
    if(!segments||alpha<=0) return;
    ctx.globalAlpha=alpha;
    const thick=[],med=[],thin=[],branch=[];
    for(const s of segments){
      if(s.isBranch) branch.push(s);
      else if(s.level<=2) thick.push(s);
      else if(s.level<=4) med.push(s);
      else thin.push(s);
    }
    function group(list,glowW,coreW,glowColor,coreColor,blur){
      if(!list.length) return;
      ctx.lineCap='round';
      ctx.beginPath();
      for(const s of list){ ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); }
      ctx.strokeStyle=glowColor; ctx.lineWidth=glowW;
      ctx.shadowColor=glowColor; ctx.shadowBlur=blur; ctx.stroke();
      ctx.beginPath();
      for(const s of list){ ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); }
      ctx.strokeStyle=coreColor; ctx.lineWidth=coreW;
      ctx.shadowBlur=0; ctx.stroke();
    }
    group(thick,16,4,   'rgba(125,211,252,0.55)','#ffffff',22);
    group(med,  10,2.4, 'rgba(125,211,252,0.45)','#ffffff',16);
    group(thin,  6,1.3, 'rgba(125,211,252,0.40)','#f5fbff',10);
    group(branch,7,1.6, 'rgba(196,165,250,0.45)','#e9d8ff',12);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  function drawGroundGlow(alpha,x){
    if(alpha<=0) return;
    const grad=ctx.createRadialGradient(x,H,0,x,H,H*0.55);
    grad.addColorStop(0,`rgba(150,200,255,${alpha*0.25})`);
    grad.addColorStop(1,'rgba(150,200,255,0)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,H*0.4,W,H*0.6);
  }

  let bolt=null, boltAlpha=0, flashAlpha=0, strikeX=0;
  let lastTime=0, rafId=null, starRafId=null;

  function drawScene(){
    drawBackground();
    drawGroundGlow(boltAlpha,strikeX);
    drawBolt(bolt,boltAlpha);
    if(flashAlpha>0){
      ctx.fillStyle=`rgba(180,210,255,${flashAlpha*0.35})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function starLoop(){
    if(boltAlpha>0){ starRafId=null; return; }
    drawScene();
    starRafId=requestAnimationFrame(starLoop);
  }

  function boltLoop(t){
    const dt=lastTime?(t-lastTime)/1000:0;
    lastTime=t;
    if(boltAlpha>0)  boltAlpha =Math.max(0,boltAlpha -dt/FADE);
    if(flashAlpha>0) flashAlpha=Math.max(0,flashAlpha-dt/0.12);
    drawScene();
    if(boltAlpha>0||flashAlpha>0){
      rafId=requestAnimationFrame(boltLoop);
    } else {
      bolt=null; lastTime=0; rafId=null;
      if(!starRafId) starRafId=requestAnimationFrame(starLoop);
    }
  }

  /* ============================================================
     AUDIO — síntesis de trueno con Web Audio API
     Ruido marrón + filtro paso-bajo + envolvente dinámica
     El trueno llega con retardo proporcional a la distancia
  ============================================================ */
  let audioCtx = null;
  let soundOn  = false;
  const btn    = document.getElementById('soundBtn');

  function getAC(){
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      audioCtx = new AC();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playThunder(distanceFactor){
    // distanceFactor: 0 = cerca, 1 = lejos
    if(!soundOn) return;
    const ac = getAC();
    if(!ac) return;

    const dist     = Math.max(0, Math.min(1, distanceFactor));
    const delay    = 0.08 + dist * 1.4;          // retardo visual→sonoro
    const duration = 2.5 + Math.random()*2.5 + dist*2.5;
    const peak     = 0.72 - dist*0.28;           // más silencioso si lejos
    const cutoff   = 220 - dist*100;             // más sordo si lejos

    const sampleRate = ac.sampleRate;
    const bufLen     = Math.ceil(sampleRate * duration);
    const buffer     = ac.createBuffer(1, bufLen, sampleRate);
    const data       = buffer.getChannelData(0);

    // Ruido marrón (integración del ruido blanco)
    let last = 0;
    for(let i = 0; i < bufLen; i++){
      const w = Math.random()*2 - 1;
      data[i] = (last + 0.02*w) / 1.02;
      last = data[i];
      data[i] *= 3.8;
    }

    const src = ac.createBufferSource();
    src.buffer = buffer;

    // Filtro paso-bajo para el retumbar sordo
    const lpf = ac.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = cutoff;
    lpf.Q.value = 0.6;

    // Segundo filtro: quita los ultragudos del ruido
    const lpf2 = ac.createBiquadFilter();
    lpf2.type = 'lowpass';
    lpf2.frequency.value = cutoff * 1.8;

    const gain = ac.createGain();
    const now  = ac.currentTime + delay;

    // Envolvente: chasquido rápido → caída → retumbar largo → silencio
    gain.gain.setValueAtTime(0,      now);
    gain.gain.linearRampToValueAtTime(peak,        now + 0.03);   // chasquido
    gain.gain.exponentialRampToValueAtTime(peak*0.45, now + 0.25);// caída rápida
    gain.gain.exponentialRampToValueAtTime(peak*0.18, now + 1.2); // retumbar
    gain.gain.exponentialRampToValueAtTime(0.0001,    now + duration*0.9);
    gain.gain.setValueAtTime(0, now + duration);

    src.connect(lpf);
    lpf.connect(lpf2);
    lpf2.connect(gain);
    gain.connect(ac.destination);

    src.start(ac.currentTime);
    src.stop(ac.currentTime + delay + duration);
  }

  btn.addEventListener('click', ()=>{
    soundOn = !soundOn;
    btn.textContent = soundOn ? '🔊' : '🔇';
    if(soundOn) getAC(); // desbloquear contexto con el gesto
  });

  /* ============================================================
     ORQUESTACIÓN: rayo + trueno
  ============================================================ */
  function strike(){
    const x       = Math.random()*W;
    const originX = Math.max(0,Math.min(W, x+(Math.random()*160-80)));
    const targetX = Math.max(0,Math.min(W, x+(Math.random()*80 -40)));
    strikeX = targetX;
    bolt      = generateBolt(originX, targetX);
    boltAlpha = 1; flashAlpha = 1; lastTime = 0;

    // Distancia simulada según posición horizontal relativa al centro
    const dist = Math.abs(x - W/2) / (W/2) * 0.7 + Math.random()*0.3;
    playThunder(dist);

    if(starRafId){ cancelAnimationFrame(starRafId); starRafId=null; }
    if(!rafId) rafId=requestAnimationFrame(boltLoop);
    setTimeout(strike, Math.random()*4000);
  }

  window.addEventListener('resize', resize);
  resize();
  starRafId = requestAnimationFrame(starLoop);
  setTimeout(strike, Math.random()*4000);
})();
</script>

</body>
</html>
